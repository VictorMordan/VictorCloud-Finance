<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Finance Cloud - Registro Mensual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            border-radius: 4px;
            padding: 2px;
        }
        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.3));
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseLib = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, query };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc, query } = window.FirebaseLib;

        // Configuración de Firebase proporcionada por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const LogoBilletera = () => (
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="logo-glow">
                <path d="M19 7V17C19 18.1046 18.1046 19 17 19H5C3.89543 19 3 18.1046 3 17V7C3 5.89543 3.89543 5 5 5H17C18.1046 5 19 5.89543 19 7Z" stroke="#2563EB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M19 9H21C21.5523 9 22 9.44772 22 10V14C22 14.5523 21.5523 15 21 15H19V9Z" stroke="#2563EB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="17" cy="12" r="1" fill="#2563EB"/>
                <path d="M7 9L11 13L15 9" stroke="#2563EB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.3"/>
            </svg>
        );

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        function App() {
            const [user, setUser] = useState(null);
            const [gastos, setGastos] = useState([]);
            const [presupuesto, setPresupuesto] = useState(1750);
            const [mes, setMes] = useState(new Date().getMonth());
            const [anio, setAnio] = useState(new Date().getFullYear());
            const [loading, setLoading] = useState(true);
            
            const hoy = new Date().toISOString().split('T')[0];
            const [nuevoGasto, setNuevoGasto] = useState({ nombre: '', monto: '', prioridad: 'alta', fecha: hoy });

            // 1. Manejo de Autenticación
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Error de autenticación:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Carga de datos desde Firestore
            useEffect(() => {
                if (!user) return;

                const collectionPath = collection(db, 'artifacts', appId, 'users', user.uid, `gastos_${anio}_${mes}`);
                
                const unsubscribe = onSnapshot(collectionPath, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // Ordenar por fecha localmente
                    data.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
                    setGastos(data);
                }, (error) => {
                    console.error("Error cargando gastos:", error);
                });

                return () => unsubscribe();
            }, [user, mes, anio]);

            const guardarGasto = async (e) => {
                e.preventDefault();
                if (!user || !nuevoGasto.nombre || !nuevoGasto.monto) return;

                try {
                    const collectionPath = collection(db, 'artifacts', appId, 'users', user.uid, `gastos_${anio}_${mes}`);
                    await addDoc(collectionPath, {
                        ...nuevoGasto,
                        monto: Number(nuevoGasto.monto),
                        createdAt: new Date().toISOString()
                    });
                    setNuevoGasto({ nombre: '', monto: '', prioridad: 'alta', fecha: hoy });
                } catch (error) {
                    console.error("Error guardando:", error);
                }
            };

            const borrarGasto = async (id) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, `gastos_${anio}_${mes}`, id);
                    await deleteDoc(docRef);
                } catch (error) {
                    console.error("Error borrando:", error);
                }
            };

            const total = gastos.reduce((acc, g) => acc + g.monto, 0);
            const libre = presupuesto - total;
            const porc = Math.min((total / presupuesto) * 100, 100);

            const formatearFecha = (f) => {
                if (!f) return "--/--";
                const partes = f.split('-');
                return `${partes[2]}/${partes[1]}`;
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">Sincronizando Nube...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <LogoBilletera />
                            <div className="leading-tight">
                                <span className="font-black text-lg text-slate-800 tracking-tighter">VICTOR</span>
                                <span className="font-bold text-lg text-blue-600 tracking-tighter ml-1">FINANCE</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4 bg-slate-100 p-1 rounded-xl shadow-inner border border-slate-200">
                            <button onClick={() => setMes(m => m === 0 ? 11 : m - 1)} className="p-1 hover:bg-white rounded-lg transition-all hover:shadow-sm"><Icon name="chevron-left" /></button>
                            <span className="font-bold text-sm min-w-[100px] text-center text-slate-700">{MESES[mes]} {anio}</span>
                            <button onClick={() => setMes(m => m === 11 ? 0 : m + 1)} className="p-1 hover:bg-white rounded-lg transition-all hover:shadow-sm"><Icon name="chevron-right" /></button>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block">
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Master Cloud</p>
                                <p className="text-xs font-bold text-slate-700 truncate max-w-[100px]">{user?.uid.substring(0,8)}...</p>
                            </div>
                            <div className="w-10 h-10 rounded-full bg-blue-600 border-2 border-white shadow-sm flex items-center justify-center text-white font-bold">
                                VM
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 flex-grow">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-7 rounded-[2rem] border border-slate-200 shadow-xl shadow-slate-200/50">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nube Conectada</p>
                                </div>
                                <div className="flex items-center gap-1 mb-4">
                                    <span className="text-2xl font-bold text-slate-300">$</span>
                                    <input type="number" className="text-4xl font-black w-full outline-none focus:text-blue-600 transition-colors" value={presupuesto} onChange={e => setPresupuesto(e.target.value)} />
                                </div>
                                <div className="space-y-4">
                                    <div className="relative w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                        <div className={`h-full transition-all duration-1000 ease-out ${porc > 90 ? 'bg-red-500' : 'bg-blue-600'}`} style={{width: porc+'%'}}></div>
                                    </div>
                                    <div className={`p-4 rounded-2xl flex items-center justify-between border ${libre < 0 ? 'bg-red-50 border-red-100' : 'bg-blue-50 border-blue-100'}`}>
                                        <div>
                                            <p className="text-[10px] font-black uppercase opacity-50 tracking-wider">Saldo Disponible</p>
                                            <p className={`text-2xl font-black ${libre < 0 ? 'text-red-600' : 'text-blue-700'}`}>${libre.toLocaleString()}</p>
                                        </div>
                                        <div className={libre < 0 ? 'text-red-400' : 'text-blue-400'}>
                                            <Icon name={libre < 0 ? "alert-circle" : "cloud-check"} size={28} />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-900 text-white p-8 rounded-[2rem] shadow-2xl shadow-blue-900/20 border border-slate-800">
                                <h3 className="text-xs font-black uppercase tracking-[0.2em] mb-6 flex items-center gap-3">
                                    <div className="p-2 bg-blue-600 rounded-lg"><Icon name="plus" size={16} /></div> 
                                    Añadir Gasto
                                </h3>
                                <form onSubmit={guardarGasto} className="space-y-5">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Descripción</label>
                                        <input type="text" placeholder="Ej. Restaurante..." className="w-full bg-slate-800/50 p-4 rounded-2xl text-sm border border-slate-700 outline-none focus:border-blue-500 transition-all" value={nuevoGasto.nombre} onChange={e => setNuevoGasto({...nuevoGasto, nombre: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Monto ($)</label>
                                            <input type="number" placeholder="0" className="w-full bg-slate-800/50 p-4 rounded-2xl text-sm border border-slate-700 outline-none focus:border-blue-500 transition-all" value={nuevoGasto.monto} onChange={e => setNuevoGasto({...nuevoGasto, monto: e.target.value})} />
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Fecha</label>
                                            <input type="date" className="w-full bg-slate-800/50 p-4 rounded-2xl text-[11px] border border-slate-700 outline-none focus:border-blue-500 transition-all" value={nuevoGasto.fecha} onChange={e => setNuevoGasto({...nuevoGasto, fecha: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Prioridad</label>
                                        <select className="w-full bg-slate-800/50 p-4 rounded-2xl text-sm border border-slate-700 outline-none focus:border-blue-500 transition-all appearance-none" value={nuevoGasto.prioridad} onChange={e => setNuevoGasto({...nuevoGasto, prioridad: e.target.value})}>
                                            <option value="alta">🔴 Gastos Críticos</option>
                                            <option value="media">🟡 Gastos Necesarios</option>
                                            <option value="baja">🟢 Ocio y Otros</option>
                                        </select>
                                    </div>
                                    <button className="w-full bg-blue-600 p-4 rounded-2xl font-black text-sm hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2">
                                        GUARDAR EN NUBE <Icon name="cloud-upload" size={16} />
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-8">
                            <div className="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                                <div className="p-8 border-b border-slate-100 bg-slate-50/30 flex justify-between items-end">
                                    <div>
                                        <p className="text-[10px] font-black uppercase tracking-[0.3em] text-blue-600 mb-1">Base de Datos Firestore</p>
                                        <h2 className="text-2xl font-black text-slate-800">{MESES[mes]} {anio}</h2>
                                    </div>
                                    <div className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-right min-w-[150px]">
                                        <p className="text-[9px] font-black text-slate-400 uppercase leading-none mb-1">Total Gastado</p>
                                        <p className="font-black text-slate-900 text-2xl">${total.toLocaleString()}</p>
                                    </div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="text-[10px] uppercase text-slate-400 font-black border-b bg-white">
                                            <tr>
                                                <th className="p-6 w-20 text-center">Nivel</th>
                                                <th className="p-6">Fecha</th>
                                                <th className="p-6">Descripción</th>
                                                <th className="p-6 text-right">Monto</th>
                                                <th className="p-6 w-16"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {gastos.length === 0 ? (
                                                <tr>
                                                    <td colSpan="5" className="p-20 text-center">
                                                        <div className="flex flex-col items-center opacity-20">
                                                            <Icon name="cloud-off" size={48} className="mb-2" />
                                                            <p className="font-bold uppercase text-xs tracking-widest">Sin registros en la nube</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ) : (
                                                gastos.map(g => (
                                                    <tr key={g.id} className="group hover:bg-blue-50/30 transition-all">
                                                        <td className="p-6 text-center">
                                                            <div className={`w-3 h-3 rounded-full mx-auto shadow-sm ring-4 ring-opacity-10 ${
                                                                g.prioridad === 'alta' ? 'bg-red-500 ring-red-500' : 
                                                                g.prioridad === 'media' ? 'bg-yellow-400 ring-yellow-400' : 
                                                                'bg-green-500 ring-green-500'
                                                            }`}></div>
                                                        </td>
                                                        <td className="p-6 font-bold text-[12px] text-slate-400 font-mono italic">
                                                            {formatearFecha(g.fecha)}
                                                        </td>
                                                        <td className="p-6 font-black text-sm text-slate-700">
                                                            {g.nombre}
                                                        </td>
                                                        <td className="p-6 text-right font-black text-slate-900 text-base">
                                                            ${g.monto.toLocaleString()}
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <button onClick={() => borrarGasto(g.id)} className="text-slate-200 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                                                                <Icon name="trash-2" size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="p-10 border-t bg-white flex flex-col md:flex-row justify-between items-center gap-8 mt-12">
                        <div className="flex items-center gap-4">
                            <div className="bg-slate-900 p-4 rounded-[1.5rem] text-white">
                                <Icon name="user" size={24} />
                            </div>
                            <div>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Developer</p>
                                <p className="font-black text-slate-800 text-xl tracking-tighter">Victor Mordan</p>
                            </div>
                        </div>
                        <div className="flex gap-4 text-xs font-bold text-slate-500 uppercase">
                            ID de Sesión: {user?.uid || 'Desconectado'}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
