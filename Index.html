<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Finance Cloud - Registro Mensual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="Icon" href="https://img.freepik.com/vector-gratis/color-azul-estilo-glifo-billetera_78370-7159.jpg?semt=ais_hybrid&w=740&q=80">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            border-radius: 4px;
            padding: 2px;
        }
        /* Efecto de resplandor suave para el logo */
        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.3));
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.FirebaseLib = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc } = window.FirebaseLib;

        // Componente del Logo Personalizado (Billetera Estilo Moderno)
        const LogoBilletera = () => (
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="logo-glow">
                <path d="M19 7V17C19 18.1046 18.1046 19 17 19H5C3.89543 19 3 18.1046 3 17V7C3 5.89543 3.89543 5 5 5H17C18.1046 5 19 5.89543 19 7Z" stroke="#2563EB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M19 9H21C21.5523 9 22 9.44772 22 10V14C22 14.5523 21.5523 15 21 15H19V9Z" stroke="#2563EB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="17" cy="12" r="1" fill="#2563EB"/>
                <path d="M7 9L11 13L15 9" stroke="#2563EB" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.3"/>
            </svg>
        );

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const MESES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        function App() {
            const [gastos, setGastos] = useState([]);
            const [presupuesto, setPresupuesto] = useState(2000);
            const [mes, setMes] = useState(new Date().getMonth());
            const [anio, setAnio] = useState(new Date().getFullYear());
            
            const hoy = new Date().toISOString().split('T')[0];
            const [nuevoGasto, setNuevoGasto] = useState({ 
                nombre: '', 
                monto: '', 
                prioridad: 'alta', 
                fecha: hoy 
            });

            useEffect(() => {
                const data = localStorage.getItem(`gastos_${anio}_${mes}`);
                if (data) {
                    setGastos(JSON.parse(data));
                } else {
                    setGastos([]);
                }
            }, [mes, anio]);

            const guardarGasto = (e) => {
                e.preventDefault();
                if (!nuevoGasto.nombre || !nuevoGasto.monto || !nuevoGasto.fecha) return;
                
                const updated = [...gastos, { ...nuevoGasto, id: Date.now(), monto: Number(nuevoGasto.monto) }];
                updated.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                
                setGastos(updated);
                localStorage.setItem(`gastos_${anio}_${mes}`, JSON.stringify(updated));
                setNuevoGasto({ nombre: '', monto: '', prioridad: 'alta', fecha: hoy });
            };

            const borrarGasto = (id) => {
                const updated = gastos.filter(g => g.id !== id);
                setGastos(updated);
                localStorage.setItem(`gastos_${anio}_${mes}`, JSON.stringify(updated));
            };

            const total = gastos.reduce((acc, g) => acc + g.monto, 0);
            const libre = presupuesto - total;
            const porc = Math.min((total / presupuesto) * 100, 100);

            const formatearFecha = (f) => {
                const partes = f.split('-');
                return `${partes[2]}/${partes[1]}`;
            };

            return (
                <div class="min-h-screen flex flex-col">
                    <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div class="flex items-center gap-3">
                            <LogoBilletera />
                            <div class="leading-tight">
                                <span class="font-black text-lg text-slate-800 tracking-tighter">VICTOR</span>
                                <span class="font-bold text-lg text-blue-600 tracking-tighter ml-1">FINANCE</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 bg-slate-100 p-1 rounded-xl shadow-inner border border-slate-200">
                            <button onClick={() => setMes(m => m === 0 ? 11 : m - 1)} class="p-1 hover:bg-white rounded-lg transition-all hover:shadow-sm"><Icon name="chevron-left" /></button>
                            <span class="font-bold text-sm min-w-[100px] text-center text-slate-700">{MESES[mes]} {anio}</span>
                            <button onClick={() => setMes(m => m === 11 ? 0 : m + 1)} class="p-1 hover:bg-white rounded-lg transition-all hover:shadow-sm"><Icon name="chevron-right" /></button>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-right hidden sm:block">
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Cuenta Activa</p>
                                <p class="text-xs font-bold text-slate-700">Victor Mordan</p>
                            </div>
                            <div class="w-10 h-10 rounded-full bg-blue-100 border-2 border-white shadow-sm flex items-center justify-center text-blue-600 font-bold">
                                VM
                            </div>
                        </div>
                    </nav>

                    <main class="max-w-6xl mx-auto w-full p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 flex-grow">
                        {/* COLUMNA IZQUIERDA */}
                        <div class="lg:col-span-4 space-y-6">
                            <div class="bg-white p-7 rounded-[2rem] border border-slate-200 shadow-xl shadow-slate-200/50">
                                <div class="flex items-center gap-2 mb-2">
                                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado Presupuestario</p>
                                </div>
                                <div class="flex items-center gap-1 mb-4">
                                    <span class="text-2xl font-bold text-slate-300">$</span>
                                    <input type="number" class="text-4xl font-black w-full outline-none focus:text-blue-600 transition-colors" value={presupuesto} onChange={e => setPresupuesto(e.target.value)} />
                                </div>
                                <div class="space-y-4">
                                    <div class="relative w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                        <div class={`h-full transition-all duration-1000 ease-out ${porc > 90 ? 'bg-red-500' : 'bg-blue-600'}`} style={{width: porc+'%'}}></div>
                                    </div>
                                    <div class={`p-4 rounded-2xl flex items-center justify-between border ${libre < 0 ? 'bg-red-50 border-red-100' : 'bg-blue-50 border-blue-100'}`}>
                                        <div>
                                            <p class="text-[10px] font-black uppercase opacity-50 tracking-wider">Saldo Disponible</p>
                                            <p class={`text-2xl font-black ${libre < 0 ? 'text-red-600' : 'text-blue-700'}`}>${libre.toLocaleString()}</p>
                                        </div>
                                        <div class={libre < 0 ? 'text-red-400' : 'text-blue-400'}>
                                            <Icon name={libre < 0 ? "alert-circle" : "sparkles"} size={28} />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-900 text-white p-8 rounded-[2rem] shadow-2xl shadow-blue-900/20 border border-slate-800">
                                <h3 class="text-xs font-black uppercase tracking-[0.2em] mb-6 flex items-center gap-3">
                                    <div class="p-2 bg-blue-600 rounded-lg"><Icon name="plus" size={16} /></div> 
                                    Añadir Gasto
                                </h3>
                                <form onSubmit={guardarGasto} class="space-y-5">
                                    <div class="space-y-1.5">
                                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">¿En qué invertiste?</label>
                                        <input type="text" placeholder="Ej. Restaurante, Gasolina..." class="w-full bg-slate-800/50 p-4 rounded-2xl text-sm border border-slate-700 outline-none focus:border-blue-500 focus:bg-slate-800 transition-all" value={nuevoGasto.nombre} onChange={e => setNuevoGasto({...nuevoGasto, nombre: e.target.value})} />
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="space-y-1.5">
                                            <label class="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Monto ($)</label>
                                            <input type="number" placeholder="0" class="w-full bg-slate-800/50 p-4 rounded-2xl text-sm border border-slate-700 outline-none focus:border-blue-500 focus:bg-slate-800 transition-all" value={nuevoGasto.monto} onChange={e => setNuevoGasto({...nuevoGasto, monto: e.target.value})} />
                                        </div>
                                        <div class="space-y-1.5">
                                            <label class="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Fecha</label>
                                            <input type="date" class="w-full bg-slate-800/50 p-4 rounded-2xl text-[11px] border border-slate-700 outline-none focus:border-blue-500 focus:bg-slate-800 transition-all" value={nuevoGasto.fecha} onChange={e => setNuevoGasto({...nuevoGasto, fecha: e.target.value})} />
                                        </div>
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1 tracking-widest">Nivel de Prioridad</label>
                                        <select class="w-full bg-slate-800/50 p-4 rounded-2xl text-sm border border-slate-700 outline-none focus:border-blue-500 focus:bg-slate-800 transition-all appearance-none" value={nuevoGasto.prioridad} onChange={e => setNuevoGasto({...nuevoGasto, prioridad: e.target.value})}>
                                            <option value="alta">🔴 Gastos Críticos</option>
                                            <option value="media">🟡 Gastos Necesarios</option>
                                            <option value="baja">🟢 Ocio y Otros</option>
                                        </select>
                                    </div>
                                    <button class="w-full bg-blue-600 p-4 rounded-2xl font-black text-sm hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2">
                                        PROCESAR GASTO <Icon name="arrow-right" size={16} />
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* COLUMNA DERECHA */}
                        <div class="lg:col-span-8 space-y-6">
                            <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                                <div class="p-8 border-b border-slate-100 bg-slate-50/30 flex justify-between items-end">
                                    <div>
                                        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-600 mb-1">Registro Digital</p>
                                        <h2 class="text-2xl font-black text-slate-800">{MESES[mes]} <span class="text-slate-400 font-light">{anio}</span></h2>
                                    </div>
                                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-right min-w-[150px]">
                                        <p class="text-[9px] font-black text-slate-400 uppercase leading-none mb-1">Total Consumido</p>
                                        <p class="font-black text-slate-900 text-2xl">${total.toLocaleString()}</p>
                                    </div>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left">
                                        <thead class="text-[10px] uppercase text-slate-400 font-black border-b bg-white">
                                            <tr>
                                                <th class="p-6 w-20 text-center">Nivel</th>
                                                <th class="p-6">Fecha</th>
                                                <th class="p-6">Descripción</th>
                                                <th class="p-6 text-right">Monto</th>
                                                <th class="p-6 w-16"></th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-50">
                                            {gastos.length === 0 ? (
                                                <tr>
                                                    <td colspan="5" class="p-20 text-center">
                                                        <div class="flex flex-col items-center opacity-20">
                                                            <Icon name="folder-open" size={48} className="mb-2" />
                                                            <p class="font-bold uppercase text-xs tracking-widest">Bandeja Vacía</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ) : (
                                                gastos.map(g => (
                                                    <tr key={g.id} class="group hover:bg-blue-50/30 transition-all">
                                                        <td class="p-6 text-center">
                                                            <div class={`w-3 h-3 rounded-full mx-auto shadow-sm ring-4 ring-opacity-10 ${
                                                                g.prioridad === 'alta' ? 'bg-red-500 ring-red-500' : 
                                                                g.prioridad === 'media' ? 'bg-yellow-400 ring-yellow-400' : 
                                                                'bg-green-500 ring-green-500'
                                                            }`}></div>
                                                        </td>
                                                        <td class="p-6 font-bold text-[12px] text-slate-400 font-mono italic">
                                                            {formatearFecha(g.fecha)}
                                                        </td>
                                                        <td class="p-6 font-black text-sm text-slate-700">
                                                            {g.nombre}
                                                        </td>
                                                        <td class="p-6 text-right font-black text-slate-900 text-base">
                                                            ${g.monto.toLocaleString()}
                                                        </td>
                                                        <td class="p-6 text-center">
                                                            <button onClick={() => borrarGasto(g.id)} class="text-slate-200 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                                                                <Icon name="trash-2" size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer class="p-10 border-t bg-white flex flex-col md:flex-row justify-between items-center gap-8 mt-12 bg-gradient-to-b from-white to-slate-50">
                        <div class="flex items-center gap-4 group">
                            <div class="bg-slate-900 p-4 rounded-[1.5rem] text-white transition-transform group-hover:rotate-12">
                                <Icon name="user" size={24} />
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none mb-1">Project Founder</p>
                                <p class="font-black text-slate-800 text-xl tracking-tighter">Victor Mordan</p>
                            </div>
                        </div>
                        <div class="flex flex-col md:flex-row gap-6 md:gap-10 text-[11px] font-black text-slate-500 uppercase tracking-widest">
                            <a href="mailto:Vmordan9@gmail.com" class="flex items-center gap-3 hover:text-blue-600 transition-all border border-slate-100 p-3 rounded-2xl hover:bg-white hover:shadow-sm">
                                <div class="bg-blue-50 p-2 rounded-lg"><Icon name="mail" size={14} /></div> Vmordan9@gmail.com
                            </a>
                            <a href="tel:+18492617804" class="flex items-center gap-3 hover:text-blue-600 transition-all border border-slate-100 p-3 rounded-2xl hover:bg-white hover:shadow-sm">
                                <div class="bg-blue-50 p-2 rounded-lg"><Icon name="phone" size={14} /></div> +1 (849) 261-7804
                            </a>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
